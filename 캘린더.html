<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정산업무 통합 대시보드</title>
    <style>
        :root { --primary: #E25B19; --dark: #333; --bg: #f4f6f8; --border: #ccc; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 15px; overflow-x: hidden; }
        
        .container { max-width: 98%; margin: auto; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px; }
        
        /* 헤더 */
        .header { background: var(--primary); color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
        .header h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .header select { font-size: 16px; padding: 3px 8px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; }
        .btn-alert { background: #111; color: #fff; border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* 메인 레이아웃: 달력 비율 1.9 : 1 로 확장 */
        .main-layout { display: grid; grid-template-columns: 1.9fr 1fr; gap: 20px; padding: 20px; height: calc(100vh - 110px); }

        /* 달력 스타일 */
        .calendar-wrap { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); flex-grow: 1; }
        .cal-header { background: var(--dark); color: #fff; text-align: center; padding: 8px; font-size: 14px; }
        .day { background: #fff; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-height: 100px; }
        .day-num { font-weight: bold; font-size: 14px; color: #555; }
        .day.sunday .day-num { color: #e74c3c; }
        .day.saturday .day-num { color: #3498db; }
        
        /* 빈 칸 메모 영역 (취소선 지원을 위해 div로 변경) */
        .empty-memo-cell { background: #fffbe6 !important; position: relative; grid-column: span var(--span); }
        .empty-memo-editor { width: 100%; height: 100%; border: none; background: transparent; padding: 22px 10px 10px; font-family: inherit; font-size: 13px; line-height: 1.5; color: #444; outline: none; box-sizing: border-box; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .memo-tag { position: absolute; top: 5px; left: 10px; font-size: 11.5px; color: #E25B19; font-weight: bold; pointer-events: none; }

        /* 달력 이벤트(일정) 뱃지 스타일 (여러 줄 텍스트 지원) */
        .cal-event { font-size: 12px; padding: 4px 6px; border-radius: 3px; background: #f0f4f8; border-left: 3px solid #3498db; font-weight: bold; line-height: 1.3; white-space: pre-wrap; word-break: keep-all; }
        .cal-event[data-cat="정산서 검토"] { border-left-color: #E25B19; background: #fff3ed; }
        .event-note { font-size: 11px; color: #666; font-weight: normal; margin-top: 4px; border-top: 1px dashed rgba(0,0,0,0.15); padding-top: 3px; }
        .cal-event.deposit { border-left-color: #27ae60 !important; background: #eafaf1 !important; color: #1e8449; }

        /* 우측 상세 테이블 */
        .details-panel { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .panel-title { background: var(--dark); color: #fff; padding: 10px 15px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .table-scroll { flex-grow: 1; overflow-y: auto; background: #fff; }
        
        /* 테이블 열 비율 조정 (날짜/상태 축소, 내용/비고 확장) */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { position: sticky; top: 0; background: #eee; z-index: 10; font-size: 13px; padding: 10px 4px; border-bottom: 2px solid var(--border); }
        td { border-bottom: 1px solid #eee; padding: 4px; vertical-align: top; }
        
        /* 텍스트 입력 칸 (여러 줄 지원을 위해 textarea로 변경) */
        td input, td select { width: 100%; box-sizing: border-box; border: 1px solid transparent; padding: 6px; font-size: 12px; text-align: center; background: transparent; font-family: inherit; }
        td textarea { width: 100%; box-sizing: border-box; border: 1px solid transparent; padding: 6px; font-size: 12px; background: transparent; font-family: inherit; resize: vertical; min-height: 32px; height: 100%; display: block; white-space: pre-wrap; }
        
        td input:focus, td textarea:focus, td select:focus { border-color: var(--primary); background: #fdfdfd; outline: none; border-radius: 3px; }
        
        select[data-status="대기"] { color: #888; }
        select[data-status="진행"] { color: #f39c12; }
        select[data-status="완료"] { color: #27ae60; font-weight: bold; }

        .btn-del { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 18px; font-weight: bold; padding: 0 5px; width: 100%; }
        .btn-url-manage { font-size: 13px; background: #555; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; }

        /* 오버레이 */
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:150; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            [2026년] 
            <select id="monthSelect" onchange="changeMonth()">
                <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
                <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
                <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
                <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
            </select>
            정산 업무 현황
        </h1>
        <div>
            <button class="btn-url-manage" onclick="toggleUrlManage()">🔗 업체 URL 관리</button>
            <button class="btn-alert" onclick="showManualAlert()">🔔 알림 다시보기</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="calendar-wrap">
            <div class="calendar" id="calGrid"></div>
        </div>

        <div class="details-panel">
            <div class="panel-title">
                <span>월별 상세 일정</span>
                <span style="font-size: 11px; font-weight: normal; color: #ddd;">* 업무내용/비고는 Shift+Enter로 줄바꿈 가능</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th width="10%">날짜</th>
                            <th width="15%">분류</th>
                            <th width="32%">업무 내용</th>
                            <th width="26%">비고(입금 등)</th>
                            <th width="12%">상태</th>
                            <th width="5%">-</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="urlModal" style="display:none; position:fixed; top:15%; left:30%; width:40%; background:white; border-radius: 8px; z-index:200; padding:25px; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
    <h3 style="margin-top:0; border-bottom:2px solid #333; padding-bottom:10px;">🔗 업체별 정산 사이트 관리</h3>
    <div style="max-height:400px; overflow-y:auto; margin-bottom:15px;">
        <table id="modalUrlTable" style="border:1px solid #eee;">
            <thead><tr style="background:#f4f4f4;"><th width="35%">업체명</th><th width="50%">URL</th><th width="15%">관리</th></tr></thead>
            <tbody id="modalUrlBody"></tbody>
        </table>
    </div>
    <div style="text-align:right;">
        <button style="padding:8px 16px; background:#E25B19; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="toggleUrlManage()">닫기</button>
    </div>
</div>

<div id="modalOverlay"></div>
<div id="autoAlertModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:420px; background:#fff; border-radius:10px; box-shadow:0 15px 40px rgba(0,0,0,0.4); z-index:200; padding:30px; text-align:center;">
    <h2 style="color:#E25B19; margin-top:0;">🔔 오늘의 정산 업무</h2>
    <p id="autoAlertMsg" style="line-height:1.6; font-size:15px; color:#333; text-align:left; background:#f9f9f9; padding:15px; border-radius:5px;"></p>
    
    <div style="margin-top:25px; display:flex; justify-content:center; gap:10px;">
        <button id="btnOpenUrls" onclick="openAlertUrls()" style="padding:12px 20px; background:#E25B19; color:#fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size:14px; display:none;">사이트 모두 열기</button>
        <button onclick="closeAutoAlert()" style="padding:12px 20px; background:#555; color:#fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size:14px;">닫기</button>
    </div>
    <div style="margin-top:15px; font-size:12px; color:#888;">
        <label style="cursor:pointer;"><input type="checkbox" id="hideTodayChk"> 오늘 하루 이 창 다시 보지 않기</label>
    </div>
</div>

<script>
    let scheduleData = JSON.parse(localStorage.getItem('combined_data_2026')) || [];
    let memos = JSON.parse(localStorage.getItem('monthly_memos_2026')) || {};
    let urlDataList = JSON.parse(localStorage.getItem('url_links_2026')) || [];

    let currentMonth = 4;
    let pendingUrlsToOpen = [];

    window.onload = () => {
        document.getElementById('monthSelect').value = currentMonth;
        refreshUI();
        checkAutoAlerts();
    };

    function save() {
        localStorage.setItem('combined_data_2026', JSON.stringify(scheduleData));
        localStorage.setItem('monthly_memos_2026', JSON.stringify(memos));
        localStorage.setItem('url_links_2026', JSON.stringify(urlDataList));
    }

    function changeMonth() {
        currentMonth = parseInt(document.getElementById('monthSelect').value);
        refreshUI();
    }

    function refreshUI() {
        renderCalendar();
        renderTable();
    }

    // 에디터 취소선 단축키 (Ctrl + Shift + X)
    function handleRichText(e) {
        if (e.ctrlKey && e.shiftKey && (e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            document.execCommand('strikeThrough', false, null);
        }
    }

    // [핵심 업데이트] 달력 모든 빈칸을 메모로 활용
    function renderCalendar() {
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        const daysArr = ['일', '월', '화', '수', '목', '금', '토'];
        daysArr.forEach(d => grid.innerHTML += `<div class="cal-header">${d}</div>`);

        const lastDateObj = new Date(2026, currentMonth, 0);
        const firstDay = new Date(2026, currentMonth - 1, 1).getDay();
        const lastDate = lastDateObj.getDate();
        const lastDayOfWeek = lastDateObj.getDay();

        // 1. 월 시작 전 빈 칸 (상단 메모)
        if(firstDay > 0) {
            let memoTop = memos[currentMonth + '_top'];
            if(memoTop === undefined) memoTop = memos[currentMonth] || ''; // 구버전 데이터 호환

            let memoCell = document.createElement('div');
            memoCell.className = 'day empty-memo-cell';
            memoCell.style.setProperty('--span', firstDay);
            memoCell.innerHTML = `
                <span class="memo-tag">📝 상단 메모 (텍스트 드래그 후 Ctrl+Shift+X 로 취소선)</span>
                <div class="empty-memo-editor" contenteditable="true" onblur="updateMemo('${currentMonth}_top', this.innerHTML)" onkeydown="handleRichText(event)">${memoTop}</div>
            `;
            grid.appendChild(memoCell);
        }

        // 2. 실제 날짜
        for(let d=1; d<=lastDate; d++) {
            let el = document.createElement('div');
            let dow = new Date(2026, currentMonth - 1, d).getDay();
            el.className = `day ${dow === 0 ? 'sunday' : ''} ${dow === 6 ? 'saturday' : ''}`;
            el.innerHTML = `<div class="day-num">${d}</div>`;

            let daily = scheduleData.filter(s => s.month === currentMonth && extractDay(s.date) === d);
            daily.forEach(evt => {
                let noteHtml = "";
                if (evt.note && evt.note.trim() !== "") {
                    noteHtml = `<div class="event-note">${evt.note}</div>`;
                }
                el.innerHTML += `<div class="cal-event" data-cat="${evt.category}">
                                    <div>${evt.display || evt.content}</div>
                                    ${noteHtml}
                                 </div>`;
            });

            // 미래 입금 표시
            scheduleData.forEach(evt => {
                if(!evt.note) return;
                let match = evt.note.match(/(\d{1,2})[\/\.](\d{1,2})/);
                if(match && parseInt(match[1], 10) === currentMonth && parseInt(match[2], 10) === d) {
                    el.innerHTML += `<div class="cal-event deposit">💰 입금: ${evt.display || evt.content}</div>`;
                }
            });
            grid.appendChild(el);
        }

        // 3. 월 종료 후 빈 칸 (하단 메모)
        if(lastDayOfWeek < 6) {
            let span = 6 - lastDayOfWeek;
            let memoBot = memos[currentMonth + '_bot'] || '';
            let memoCell = document.createElement('div');
            memoCell.className = 'day empty-memo-cell';
            memoCell.style.setProperty('--span', span);
            memoCell.innerHTML = `
                <span class="memo-tag">📝 하단 메모 (텍스트 드래그 후 Ctrl+Shift+X 로 취소선)</span>
                <div class="empty-memo-editor" contenteditable="true" onblur="updateMemo('${currentMonth}_bot', this.innerHTML)" onkeydown="handleRichText(event)">${memoBot}</div>
            `;
            grid.appendChild(memoCell);
        }
    }

    function updateMemo(key, val) { memos[key] = val; save(); }

    // [핵심 업데이트] 업무 내용/비고 다중 라인(textarea) 지원
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let monthData = scheduleData.filter(s => s.month === currentMonth);
        monthData.forEach(item => appendRow(tbody, item, false));
        appendRow(tbody, null, true); 
    }

    function appendRow(tbody, item, isBlank) {
        let tr = document.createElement('tr');
        if(isBlank) {
            tr.innerHTML = `
                <td><input type="text" placeholder="예: 4-1" onchange="addNew(this, 'date')"></td>
                <td><input type="text" placeholder="분류" onchange="addNew(this, 'category')"></td>
                <td><textarea placeholder="업무내용 입력" onchange="addNew(this, 'content')"></textarea></td>
                <td><textarea placeholder="비고(입금 등)" onchange="addNew(this, 'note')"></textarea></td>
                <td><select disabled><option>대기</option></select></td>
                <td></td>
            `;
        } else {
            tr.innerHTML = `
                <td><input type="text" value="${item.date}" onchange="updateItem(${item.id}, 'date', this.value)"></td>
                <td><input type="text" value="${item.category}" onchange="updateItem(${item.id}, 'category', this.value)"></td>
                <td><textarea onchange="updateItem(${item.id}, 'content', this.value)">${item.content}</textarea></td>
                <td><textarea onchange="updateItem(${item.id}, 'note', this.value)">${item.note || ''}</textarea></td>
                <td style="vertical-align: middle;">
                    <select data-status="${item.status}" onchange="updateItem(${item.id}, 'status', this.value); this.dataset.status=this.value;">
                        <option value="대기" ${item.status==='대기'?'selected':''}>대기</option>
                        <option value="진행" ${item.status==='진행'?'selected':''}>진행</option>
                        <option value="완료" ${item.status==='완료'?'selected':''}>완료</option>
                        <option value="보류" ${item.status==='보류'?'selected':''}>보류</option>
                    </select>
                </td>
                <td style="vertical-align: middle;"><button class="btn-del" onclick="delItem(${item.id})">×</button></td>
            `;
        }
        tbody.appendChild(tr);
    }

    function addNew(el, field) {
        if(!el.value.trim()) return;
        let newItem = { id: Date.now(), month: currentMonth, date: "", category: "정산서 검토", content: "", display: "", status: "대기", note: "" };
        newItem[field] = el.value;
        scheduleData.push(newItem);
        save(); refreshUI();
    }

    function updateItem(id, field, val) {
        let item = scheduleData.find(s => s.id === id);
        if(item) { item[field] = val; save(); renderCalendar(); }
    }

    function delItem(id) { scheduleData = scheduleData.filter(s => s.id !== id); save(); refreshUI(); }

    function toggleUrlManage() {
        const m = document.getElementById('urlModal');
        const o = document.getElementById('modalOverlay');
        const isShowing = m.style.display === 'block';
        m.style.display = isShowing ? 'none' : 'block';
        o.style.display = isShowing ? 'none' : 'block';
        if(!isShowing) renderUrlModal();
    }

    function renderUrlModal() {
        const b = document.getElementById('modalUrlBody');
        b.innerHTML = '';
        urlDataList.forEach(u => {
            b.innerHTML += `<tr>
                <td style="padding:5px;"><input type="text" style="width:100%; box-sizing:border-box; padding:5px;" value="${u.company}" onchange="updateUrl(${u.id}, 'company', this.value)"></td>
                <td style="padding:5px;"><input type="text" style="width:100%; box-sizing:border-box; padding:5px;" value="${u.url}" onchange="updateUrl(${u.id}, 'url', this.value)"></td>
                <td style="text-align:center;"><button style="background:none; border:none; color:red; cursor:pointer;" onclick="delUrl(${u.id})">삭제</button></td>
            </tr>`;
        });
        b.innerHTML += `<tr>
            <td style="padding:5px;"><input type="text" style="width:100%; box-sizing:border-box; padding:5px;" placeholder="새 업체명" onchange="addUrl(this, 'company')"></td>
            <td style="padding:5px;"><input type="text" style="width:100%; box-sizing:border-box; padding:5px;" placeholder="URL (http://...)" onchange="addUrl(this, 'url')"></td>
            <td></td>
        </tr>`;
    }

    function addUrl(el, field) {
        if(!el.value.trim()) return;
        let n = { id: Date.now(), company: "", url: "" };
        n[field] = el.value; urlDataList.push(n); save(); renderUrlModal();
    }
    function updateUrl(id, f, v) { let u = urlDataList.find(x=>x.id===id); u[f]=v; save(); }
    function delUrl(id) { urlDataList = urlDataList.filter(x=>x.id!==id); save(); renderUrlModal(); }

    function extractDay(s) {
        if(!s) return -1;
        let m = s.match(/-(\d+)/); return m ? parseInt(m[1]) : -1;
    }

    // [자동 팝업 알림 로직]
    function checkAutoAlerts(isManual = false) {
        const todayStr = new Date().toLocaleDateString();
        if (!isManual && localStorage.getItem('hideAlertDate_2026') === todayStr) return; 

        const today = new Date();
        const tMonth = today.getMonth() + 1;
        const tDay = today.getDate();
        
        pendingUrlsToOpen = [];
        let companies = [];
        let depositMsgs = [];

        scheduleData.forEach(item => {
            let match = (item.note || "").match(/(\d{1,2})[\/\.](\d{1,2})/);
            if(match && parseInt(match[1], 10) === tMonth && parseInt(match[2], 10) === tDay) {
                depositMsgs.push(`- ${item.display || item.content}`);
            }

            if(item.category.includes("정산서") && extractDay(item.date) === tDay) {
                urlDataList.forEach(u => {
                    if(u.company && item.content.includes(u.company)) {
                        if(!companies.includes(u.company)) {
                            companies.push(u.company);
                            if(u.url) pendingUrlsToOpen.push(u.url);
                        }
                    }
                });
            }
        });

        let htmlMsg = "";
        if(depositMsgs.length > 0) { htmlMsg += `<strong style="color:#27ae60;">[입금일 도래]</strong><br>${depositMsgs.join("<br>")}<br><br>`; }
        if(companies.length > 0) { htmlMsg += `<strong style="color:#E25B19;">[정산서 검토]</strong><br>${companies.join(", ")}<br>`; }

        if (htmlMsg !== "") {
            document.getElementById('autoAlertMsg').innerHTML = htmlMsg;
            document.getElementById('autoAlertModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            
            const btnOpen = document.getElementById('btnOpenUrls');
            btnOpen.style.display = pendingUrlsToOpen.length > 0 ? 'inline-block' : 'none';
        } else if (isManual) {
            alert(`오늘(${tMonth}/${tDay}) 예정된 정산/입금 일정이 없습니다.`);
        }
    }

    function showManualAlert() { checkAutoAlerts(true); }

    function openAlertUrls() {
        pendingUrlsToOpen.forEach(url => window.open(url, '_blank'));
        closeAutoAlert();
    }

    function closeAutoAlert() {
        if (document.getElementById('hideTodayChk').checked) {
            localStorage.setItem('hideAlertDate_2026', new Date().toLocaleDateString());
        }
        document.getElementById('autoAlertModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>
</body>
</html>
