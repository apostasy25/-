<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기안서 검증기 v7.2 — 테라핀 정산팀</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root {
  --navy:#1a2744;--navy-l:#2a3a60;--accent:#3b6fd4;--accent-l:#e8edf8;
  --ok:#1a7f4b;--ok-bg:#eafaf1;--err:#c0392b;--err-bg:#fdf0ee;
  --warn:#b7700a;--warn-bg:#fef9ec;--border:#d8dde8;
  --text:#1a2744;--sub:#6b7a99;--bg:#f4f6fb;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:28px 16px 80px}
.hd{max-width:760px;margin:0 auto 20px;display:flex;align-items:center;gap:13px}
.logo{width:42px;height:42px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:21px;height:21px}
.hd-txt h1{font-size:17px;font-weight:700;color:var(--navy)}
.hd-txt p{font-size:11px;color:var(--sub);margin-top:2px}
.setup-card{background:var(--white);border:1.5px solid #f0c96a;border-radius:13px;max-width:760px;margin:0 auto 13px;overflow:hidden}
.setup-hd{background:#fffbee;padding:11px 17px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #f0e4bb}
.setup-hd h2{font-size:12px;font-weight:600;color:#7a5800}
.setup-bd{padding:14px 17px}
.api-row{display:flex;gap:7px}
.api-row input{flex:1;height:36px;border:1.5px solid var(--border);border-radius:7px;padding:0 11px;font-size:12px;font-family:monospace;outline:none;background:#fafbfd}
.btn-save{height:36px;padding:0 14px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.key-ok{font-size:11px;color:var(--ok);margin-top:5px;display:none}
.key-ok.show{display:block}
.card{background:var(--white);border:1px solid var(--border);border-radius:13px;max-width:760px;margin:0 auto 13px;overflow:hidden}
.ch{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:9px}
.sb{background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.ch h2{color:#fff;font-size:13px;font-weight:600}
.cb{padding:16px 18px}
.drop{border:2px dashed var(--border);border-radius:9px;padding:20px 18px;text-align:center;cursor:pointer;background:#fafbfd;position:relative}
.drop-ic{font-size:24px;margin-bottom:5px}
.drop p{font-size:12px}
.img-prev{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.img-prev.show{display:block}
.img-prev img{width:100%;max-height:240px;object-fit:contain;background:#f0f2f7;display:block}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.opt-grid{grid-template-columns:1fr}}
.btn-v{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;max-width:760px;margin:7px auto;height:52px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.prog{max-width:760px;margin:0 auto 13px;display:none}
.prog.show{display:block}
.prog-steps{display:flex;gap:5px}
.ps{flex:1;padding:7px 6px;border-radius:7px;font-size:10px;font-weight:600;text-align:center;border:1.5px solid var(--border);color:var(--sub);background:#fff}
.ps.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.ps.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
.rc{display:none}
.rc.show{display:block}
.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid transparent;margin-bottom:7px}
.ci.pass{background:var(--ok-bg);border-color:#b2e0cc}
.ci.fail{background:var(--err-bg);border-color:#f5c0bb}
.cs{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700}
.ci.pass .cs{background:var(--ok);color:#fff}
.ci.fail .cs{background:var(--err);color:#fff}
.cl-lbl{font-size:10px;font-weight:700;color:var(--sub);margin-bottom:2px}
.cl-det{font-size:12px;font-weight:500}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hd">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
  </div>
  <div class="hd-txt">
    <h1>기안서 검증기 <span style="font-size:11px;color:var(--sub);font-weight:400">v7.2</span></h1>
    <p>메일 · 홈페이지 · 엑셀 · 서류 — 통합 검증</p>
  </div>
</div>

<div class="setup-card">
  <div class="setup-hd"><h2>🔑 최초 1회 설정</h2></div>
  <div class="setup-bd">
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
      <button class="btn-save" onclick="saveKey()">저장</button>
    </div>
    <div class="key-ok" id="keyOk">✅ 저장됨</div>
  </div>
</div>

<div class="card">
  <div class="ch"><span class="sb">STEP 1</span><h2>기안서 화면 캡처</h2></div>
  <div class="cb">
    <div class="drop" id="imgDrop">
      <input type="file" id="imgFile" accept="image/*">
      <div class="drop-ic">🖼</div>
      <p><strong>이미지 선택 또는 드롭</strong></p>
    </div>
    <div class="img-prev" id="imgPrev">
      <img id="prevImg" src="" alt="">
    </div>
  </div>
</div>

<div class="card">
  <div class="ch"><span class="sb">STEP 2</span><h2>정산 엑셀 파일</h2></div>
  <div class="cb">
    <div class="drop" id="xlsDrop">
      <input type="file" id="xlsFile" accept=".xlsx,.xls" multiple>
      <div class="drop-ic">📊</div>
      <p><strong>엑셀 파일 선택</strong></p>
    </div>
    <div id="fileList" class="file-list"></div>
    <div id="totalBar" class="total-bar" style="display:none">
      <span>📊 합계:</span><span id="totalBarVal">0원</span>
    </div>
  </div>
</div>

<div class="card">
  <div class="ch"><span class="sb">STEP 3</span><h2>거래처 자료 (선택)</h2></div>
  <div class="cb">
    <div class="opt-grid">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px">✉️ 메일 캡처</div>
        <div class="drop" style="padding:16px 12px">
          <input type="file" id="mailFile" accept="image/*,.pdf" multiple>
          <p style="font-size:11px"><strong>메일 추가</strong></p>
        </div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px">🌐 홈페이지 캡처</div>
        <div class="drop" style="padding:16px 12px">
          <input type="file" id="webFile" accept="image/*,.pdf" multiple>
          <p style="font-size:11px"><strong>홈페이지 추가</strong></p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="ch"><span class="sb">STEP 4</span><h2>서류 자료 (선택)</h2></div>
  <div class="cb">
    <div class="opt-grid">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px">🏢 사업자등록증</div>
        <div class="drop" style="padding:16px 12px">
          <input type="file" id="bizFile" accept="image/*,.pdf" multiple>
          <p style="font-size:11px"><strong>사업자 추가</strong></p>
        </div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px">📑 계약서</div>
        <div class="drop" style="padding:16px 12px">
          <input type="file" id="conFile" accept="image/*,.pdf" multiple>
          <p style="font-size:11px"><strong>계약서 추가</strong></p>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="btn-v" id="vBtn" onclick="run()">🔍 &nbsp;AI 검증 시작</button>

<div class="prog" id="prog">
  <div class="prog-steps">
    <div class="ps" id="ps1">📸 기안 분석</div>
    <div class="ps" id="ps2">✉️ 메일 분석</div>
    <div class="ps" id="ps3">🌐 홈피 분석</div>
    <div class="ps" id="ps4">📊 엑셀 읽기</div>
    <div class="ps" id="ps5">🏢 서류 분석</div>
    <div class="ps" id="ps6">⚖️ 전체 대사</div>
  </div>
</div>

<div class="card rc" id="rc">
  <div id="rsum"></div>
  <div id="r_excel"></div>
  <div style="text-align:center"><button style="margin:10px; padding:8px 20px;" onclick="location.reload()">↩ 초기화</button></div>
</div>

<script>
let apiKey = localStorage.getItem('tf_api_key') || '';
let imgB64 = null, imgMime = 'image/png';
let mailImages=[], webImages=[], bizImages=[], conImages=[];
let excelFiles = [];

if(apiKey){ document.getElementById('apiKey').value=apiKey; document.getElementById('keyOk').classList.add('show'); }
function saveKey(){
  const v=document.getElementById('apiKey').value.trim();
  apiKey=v; localStorage.setItem('tf_api_key',v);
  document.getElementById('keyOk').classList.add('show');
}

// --- 핵심 보정: 엑셀 날짜 오차 해결 (+9시간) ---
function normDate(v) {
  if (!v) return null;
  if (v instanceof Date) {
    const kstDate = new Date(v.getTime() + (9 * 60 * 60 * 1000));
    return `${kstDate.getUTCFullYear()}-${String(kstDate.getUTCMonth()+1).padStart(2,'0')}-${String(kstDate.getUTCDate()).padStart(2,'0')}`;
  }
  const m = String(v).match(/(\d{4})[년\s./-]*(\d{1,2})[월\s./-]*(\d{1,2})?/);
  return m ? `${m[1]}-${m[2].padStart(2,'0')}-${(m[3]||"01").padStart(2,'0')}` : null;
}

// --- AE열(정산월), AD열(서비스월) 정밀 스캔 ---
function getExcelMeta(wb) {
  let meta = { 작성일자: null, 서비스월: null };
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, UTC: true });
  for (let r = 0; r < Math.min(data.length, 30); r++) {
    const row = data[r];
    if (!row) continue;
    for (let c = 0; c < row.length; c++) {
      const val = String(row[c] || "").trim();
      if (val.includes("정산월") || c === 30) {
        const d = (val.match(/\d{4}/)) ? row[c] : (data[r+1]?data[r+1][c]:null);
        if (d && !meta.작성일자) meta.작성일자 = normDate(d);
      }
      if (val.includes("서비스월") || c === 29) {
        const d = (val.match(/\d{4}/)) ? row[c] : (data[r+1]?data[r+1][c]:null);
        if (d && !meta.서비스월) meta.서비스월 = normDate(d);
      }
    }
  }
  return meta;
}

// --- 파일 처리 로직 ---
function setupDrop(id, handler) {
  const el = document.getElementById(id);
  el.onclick = () => el.querySelector('input').click();
  el.querySelector('input').onchange = e => handler(e.target.files);
}

document.getElementById('imgFile').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('prevImg').src = ev.target.result;
    document.getElementById('imgPrev').classList.add('show');
  };
  reader.readAsDataURL(file);
};

document.getElementById('xlsFile').onchange = e => {
  for(const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      excelFiles.push({ name: file.name, wb: wb, total: calculateTotal(wb) });
      renderExcelList();
    };
    reader.readAsArrayBuffer(file);
  }
};

function calculateTotal(wb) {
  const ws = wb.Sheets['정산요약'] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1});
  for(const row of rows) {
    const label = String(row[0] || "");
    if(label.includes('최종 입금액') || label.includes('정산총액')) return parseInt(String(row[1]).replace(/[^0-9]/g,''));
  }
  return null;
}

function renderExcelList() {
  const list = document.getElementById('fileList');
  list.innerHTML = excelFiles.map(f => `<div class="file-card">📊 ${f.name}</div>`).join('');
}

// --- AI 분석 ---
async function aiCall(b64, prompt) {
  if(!b64) return null;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-3-haiku-20240307',
      max_tokens: 1000,
      messages: [{role:'user', content:[{type:'image', source:{type:'base64', media_type:'image/png', data:b64}}, {type:'text', text:prompt + "\nJSON ONLY."}]}]
    })
  });
  const data = await res.json();
  try { return JSON.parse(data.content[0].text.replace(/```json|```/g, '')); } catch(e) { return null; }
}

async function run() {
  if(!apiKey || !imgB64 || excelFiles.length === 0) return alert('필수 파일을 등록해주세요.');
  const btn = document.getElementById('vBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div>';
  document.getElementById('prog').classList.add('show');

  try {
    const 기안Task = aiCall(imgB64, "기안서에서 '본문_계산서작성일자', '본문_서비스월', '세금계산서_rows' 추출.");
    const [기안] = await Promise.all([기안Task]);
    setStep(1, 'done');

    const excelMeta = getExcelMeta(excelFiles[0].wb);
    setStep(4, 'done');

    const imgDate = normDate(기안?.본문_계산서작성일자);
    const xlDate = excelMeta.작성일자;
    const matchDate = (imgDate === xlDate);

    let h = `<div class="chk-group"><div class="gt">검증 결과</div>`;
    h += `<div class="ci ${matchDate?'pass':'fail'}"><div class="cs">${matchDate?'✓':'✕'}</div><div class="cc"><div class="cl-lbl">작성일자 (정산월)</div><div class="cl-det">기안:${imgDate} / 엑셀:${xlDate}</div></div></div>`;
    
    const imgSrv = (기안?.본문_서비스월 || "").substring(0,7);
    const xlSrv = (excelMeta.서비스월 || "").substring(0,7);
    const matchSrv = (imgSrv === xlSrv);
    h += `<div class="ci ${matchSrv?'pass':'fail'}"><div class="cs">${matchSrv?'✓':'✕'}</div><div class="cc"><div class="cl-lbl">서비스월</div><div class="cl-det">기안:${imgSrv} / 엑셀:${xlSrv}</div></div></div>`;

    document.getElementById('r_excel').innerHTML = h;
    document.getElementById('rsum').innerHTML = `<h3>검증 완료</h3>`;
    document.getElementById('rc').classList.add('show');
    setStep(6, 'done');
  } catch(e) { alert(e.message); } finally { btn.disabled = false; btn.innerHTML = '🔍 AI 검증 시작'; }
}

function setStep(n,s){ document.getElementById('ps'+n).className='ps '+s; }
</script>
</body>
</html>
