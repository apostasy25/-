<style>

body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:28px 16px 80px}

.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-v{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;max-width:760px;margin:7px auto;height:52px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.rc{display:none}
.rc.show{display:block}
.r-sum{padding:16px 18px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--border)}
.ri{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ri.ok{background:var(--ok-bg)}
.ri.fail{background:var(--err-bg)}
.rt h3{font-size:15px;font-weight:700}
.rt h3.ok{color:var(--ok)}
.rt h3.fail{color:var(--err)}
.chk-group{padding:13px 18px;border-bottom:1px solid var(--border)}
.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid transparent;margin-bottom:7px;background:#fff}
.ci.pass{border:1.5px solid #b2e0cc}
.ci.fail{background:var(--err-bg);border:1.5px solid #f5c0bb}

.cs{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;margin-top:2px}
.ci.pass .cs{background:var(--ok);color:#fff}
.ci.fail .cs{background:var(--err);color:#fff}
.ci.info .cs{background:var(--sub);color:#fff}
.cc{flex:1}
.cl-lbl{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:3px}
.cl-det{font-size:12px;font-weight:600;color:#111}
.diff{margin-top:8px;display:flex;flex-direction:column;gap:5px;background:#f4f6fb;padding:8px 10px;border-radius:6px}
.dr{display:flex;align-items:center;gap:6px}

.dtag.src1{border-color:var(--navy);color:var(--navy)}
.dtag.src2{background:#e3f5ec;color:#1a7f4b}

.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}

      <div class="drop" id="mailDrop"><input type="file" id="mailInput" accept="image/*,.pdf" multiple style="display:none"><div class="drop-ic">📧</div><p>메일 캡처</p><div id="mailCount" style="font-size:10px; color:var(--accent)"></div></div>
    </div>

<button class="btn-v" id="vBtn" onclick="run()">🔍 &nbsp;AI 심층 대사 시작</button>

</div>

<script>
let apiKey = localStorage.getItem('tf_api_key') || '';
let imgFileObj = null; let excelFiles = []; let mailFiles = [], conFiles = [];
let globalErrors = 0;

if(apiKey) document.getElementById('apiKey').value = apiKey;
function saveKey(){ localStorage.setItem('tf_api_key', document.getElementById('apiKey').value.trim()); alert('저장되었습니다.'); }

function fmtAmt(n){ if(n===null||n===undefined) return '—'; return Number(n).toLocaleString('ko-KR'); }
function parseAmt(v){ if(v===null||v===undefined||v==='') return null; const n=parseFloat(String(v).replace(/[^0-9.-]/g,'')); return isNaN(n)?null:n; }

// PDF 고해상도 처리
async function pdfToImages(file){
  const ab = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({data:ab}).promise; const imgs = [];
  for(let i=1;i<=Math.min(pdf.numPages, 4);i++){
    const page = await pdf.getPage(i); const vp = page.getViewport({scale:3.0}); const cv = document.createElement('canvas');
    cv.width=vp.width; cv.height=vp.height; await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    imgs.push({ media_type: 'image/png', data: cv.toDataURL('image/png').split(',')[1] });
  } return imgs;
}
async function fileToBase64s(file) {
  if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) return await pdfToImages(file);
  const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(r.result); r.readAsDataURL(file); });
  return [{ media_type: b64.match(/^data:(image\/[a-zA-Z0-9+.-]+);base64,/)?.[1]||'image/jpeg', data: b64.split(',')[1] }];
}

function initDrop(id, inputId, arr, cntId, isImg=false) {
  const zone = document.getElementById(id); const input = document.getElementById(inputId);
  zone.onclick = () => input.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('over'); };
  zone.ondragleave = e => { e.preventDefault(); zone.classList.remove('over'); };
  const handle = files => {
    if(isImg) {
      imgFileObj = files[0]; const r = new FileReader();
      r.onload = ev => { document.getElementById('prevImg').src = imgFileObj.name.endsWith('.pdf') ? 'https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg' : ev.target.result; };
      r.readAsDataURL(imgFileObj); document.getElementById('imgPrev').classList.add('show');
    } else {
      for(let f of files) {
        arr.push(f);
        if(f.name.endsWith('.xlsx')||f.name.endsWith('.csv')) {
            const r = new FileReader();
            r.onload = ev => { excelFiles.push({name: f.name, data: parseExcelMaster(XLSX.read(ev.target.result, {type:'array'}))}); };
            r.readAsArrayBuffer(f);
        }
      }
      if(cntId) document.getElementById(cntId).innerText = arr.length + '개 첨부됨';
    }
  };
  zone.ondrop = e => { e.preventDefault(); zone.classList.remove('over'); if(e.dataTransfer.files.length) handle(e.dataTransfer.files); };
  input.onchange = e => { if(e.target.files.length) handle(e.target.files); };
}
initDrop('imgDrop', 'imgInput', [], null, true);
initDrop('xlsDrop', 'xlsInput', [], 'xlsCount');
initDrop('mailDrop','mailInput', mailFiles, 'mailCount');
initDrop('conDrop','conInput', conFiles, 'conCount');

// [V12.0] 통합 엑셀 파서: 매출(수익, MG, Tax) 및 매입(소득세, 실지급액) 종합 탐색
function parseExcelMaster(wb) {
  let meta = { 총수익: 0, MG차감액: 0, 해외Tax: 0, 총공급가: 0, 실지급액: 0 };
  for(const sn of wb.SheetNames) {
    const data = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:null});
    for(let r=0; r<data.length; r++) {
      const row = data[r]||[];
      for(let c=0; c<row.length; c++) {
        const cell = String(row[c]).replace(/\s/g,'');
        // 매출 트랙
        if(cell.includes('테라핀매출') || cell.includes('총정산금')) {
          for(let cc=c+1; cc<row.length; cc++) { if(parseAmt(row[cc])) meta.총수익 = Math.max(meta.총수익, parseAmt(row[cc])); }
        }
        if(cell.includes('MG차감')) {
          for(let cc=c+1; cc<row.length; cc++) { if(parseAmt(row[cc])) meta.MG차감액 = Math.max(meta.MG차감액, parseAmt(row[cc])); }
        }
        if(cell.includes('원천징수세') || cell.toLowerCase().includes('tax')) {
          for(let cc=c+1; cc<row.length; cc++) { if(parseAmt(row[cc])) meta.해외Tax += parseAmt(row[cc]); }
        }
        // 매입 트랙
        if(cell.includes('지급총액') || cell.includes('공급가')) {
          for(let cc=c+1; cc<row.length; cc++) { if(parseAmt(row[cc])) meta.총공급가 = Math.max(meta.총공급가, parseAmt(row[cc])); }
        }
        if(cell.includes('순지급액') || cell.includes('실지급액')) {
          for(let cc=c+1; cc<row.length; cc++) { if(parseAmt(row[cc])) meta.실지급액 = Math.max(meta.실지급액, parseAmt(row[cc])); }
        }
      }
    }
  }
  // 기본 연산 세팅 (엑셀 합계에 MG가 차감되어 있지 않은 경우를 대비한 역산 준비)
  meta.예상매출계산서 = (meta.총수익 || meta.총공급가) - meta.MG차감액 - meta.해외Tax;
  return meta;
}

// [V12.0] 프롬프트 고도화: 배열 강제화 및 다중 금액 추출
const PROMPT_기안서=`이미지 속 문서를 분석하여 다음 규격의 JSON으로만 응답하세요.
- 기안유형: ["매입_지급", "매출_국내", "매출_해외", "선인세_매절"] 중 택1
- 작성일자: 작성일 또는 청구일 문자열 (예: "2026-04-01")
- 입금예정일: 문서 하단 참고사항 등의 지급조건 "문장 원문 그대로" 추출.
- 총공급가액: 부가세 제외 순수 원금 합계.
- MG차감액: 본문 중 "MG 차감" 명시된 금액 (없으면 0)
- 세금계산서발행액: 최종 실지급/청구되는 합계 금액.
- 세부항목배열: 매절 기안처럼 여러 작품이 묶인 경우 [{"작품명":"A", "단가":50000}, ...] 형태로 모두 추출. 없으면 [].
{"기안유형":null, "작성일자":null, "입금예정일":null, "총공급가액":0, "MG차감액":0, "세금계산서발행액":0, "세부항목배열":[]}`;

const PROMPT_계약서=`계약서에서 다음을 추출해 JSON으로 응답하세요.
- 총계약금액: 명시된 총액 (숫자)
- 지급조건: 지급 기한 원문 전체 (예: "계산서 수취 후 익월 말일")
- 세부항목배열: 표에 나열된 다건 작품의 경우 [{"작품명":"A", "단가":50000}, ...] 형태로 배열 추출. 단건이면 [].
{"총계약금액":0, "지급조건":null, "세부항목배열":[]}`;

async function aiCall(file, prompt) {
  if(!file) return null;
  const b64Objs = await fileToBase64s(file);
  let contentBlocks = b64Objs.map(obj => ({type:'image', source:{type:'base64', media_type: obj.media_type, data: obj.data}}));
  contentBlocks.push({type:'text', text:prompt});
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-3-5-haiku-20241022', max_tokens: 1500, messages: [{role:'user', content: contentBlocks}] })
    });
    const d = await res.json();
    let raw = d.content[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
    return JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
  } catch(e) { return null; }
}

// 오차 허용 비교 함수 (tolerance: 오차범위)
function cmpTol(label, val1, val2, name1, name2, tolerance=0) {
  if(val2 === null || val2 === undefined) return `<div class="ci info"><div class="cs">i</div><div class="cc"><div class="cl-lbl">${label}</div><div class="cl-det" style="color:var(--sub)">${name2} 확인불가</div></div></div>`;
  const v1 = Number(val1), v2 = Number(val2);
  const diff = Math.abs(v1 - v2);
  const match = diff <= tolerance;
  if(!match) globalErrors++;
  
  return `<div class="ci ${match?'pass':'fail'}"><div class="cs">${match?'✓':'✕'}</div><div class="cc">
    <div class="cl-lbl">${label} <span style="font-size:9px;color:var(--sub)">(허용오차: ±${tolerance})</span></div>
    <div class="cl-det">${match?'금액 일치 ✓':'오차범위 초과 불일치 ⚠'}</div>
    <div class="diff">
      <div class="dr"><span class="dtag src1">${name1}</span><span class="dval">${fmtAmt(v1)}</span></div>
      <div class="dr"><span class="dtag src2">${name2}</span><span class="dval" style="color:${match?'var(--ok)':'var(--err)'}">${fmtAmt(v2)}</span></div>
    </div>
  </div></div>`;
}

function cmpTxt(label, val1, val2, name1, name2) {
  if(!val2) return `<div class="ci info"><div class="cs">i</div><div class="cc"><div class="cl-lbl">${label}</div><div class="cl-det" style="color:var(--sub)">${name2} 확인불가</div></div></div>`;
  const t1 = String(val1).replace(/\s/g,''), t2 = String(val2).replace(/\s/g,'');
  const match = t1.includes(t2) || t2.includes(t1);
  if(!match) globalErrors++;
  return `<div class="ci ${match?'pass':'fail'}"><div class="cs">${match?'✓':'✕'}</div><div class="cc">
    <div class="cl-lbl">${label}</div><div class="cl-det">${match?'내용 매칭 ✓':'내용 불일치 ⚠'}</div>
    <div class="diff"><div class="dr"><span class="dtag src1">${name1}</span><span class="dval">${val1}</span></div><div class="dr"><span class="dtag src2">${name2}</span><span class="dval">${val2}</span></div></div>
  </div></div>`;
}

async function run() {
  if(!apiKey || !imgFileObj) return alert('기안서를 업로드해주세요.');
  const btn = document.getElementById('vBtn'); btn.disabled = true; btn.innerHTML = '<div class="spin"></div>';
  globalErrors = 0; document.getElementById('r_err').innerHTML = ''; document.getElementById('r_core').innerHTML = '';
  
  try {
    const 기안 = await aiCall(imgFileObj, PROMPT_기안서) || {};
    const type = 기안.기안유형 || '매출_국내';
    
    // 파일 필수조건 검증
    let missing = [];
    if(type.includes('매입') && excelFiles.length === 0) missing.push('매입 취합 엑셀');
    if(type.includes('매출') && excelFiles.length === 0) missing.push('정산 엑셀 파일');
    if(type.includes('선인세') && conFiles.length === 0) missing.push('계약서 파일');

    if(missing.length > 0) {
        document.getElementById('rc').classList.add('show');
        document.getElementById('rsum').innerHTML = `<div class="r-sum"><div class="ri fail">❌</div><div class="rt"><h3 class="fail">필수 첨부파일 누락</h3><p>기안 유형(<b>${type}</b>)에 필요한 <b>[${missing.join(', ')}]</b>이(가) 업로드되지 않았습니다.</p></div></div>`;
        return;
    }

    const 계약서 = conFiles.length ? await aiCall(conFiles[0], PROMPT_계약서) : null;
    const 엑셀 = excelFiles.length ? excelFiles[0].data : null;

    let coreHtml = `<div class="chk-group" style="background:var(--accent-l); border-radius:8px; padding:12px; margin-bottom:10px">
      <strong style="color:var(--navy)">📝 판독된 기안 라우팅: [ ${type} ]</strong><br>
      <span style="font-size:11px; color:var(--sub)">해당 유형의 회계 원칙(오차허용, 역산 등)에 맞춰 정밀 대사합니다.</span>
    </div>`;

    // --- 라우팅 1: 매입/지급 (원단위 절사 오차 ±10 허용) ---
    if (type === '매입_지급') {
        coreHtml += cmpTol('1. 매입 실지급액 대사', 기안.세금계산서발행액, 엑셀?.실지급액, '기안서', '엑셀합계', 10);
        coreHtml += cmpTol('2. 매입 공급가액 대사', 기안.총공급가액, 엑셀?.총공급가, '기안서', '엑셀합계', 10);
    } 
    // --- 라우팅 2: 선인세/매절 (배열 다건 대사 및 계약서 기준) ---
    else if (type === '선인세_매절') {
        if (기안.세부항목배열 && 기안.세부항목배열.length > 1 && 계약서?.세부항목배열?.length > 1) {
            coreHtml += `<div class="ci pass"><div class="cs">✓</div><div class="cc"><div class="cl-lbl">1. 다중 작품(매절) 1:1 단가 대사</div><div class="cl-det">배열 매칭 완료</div></div></div>`;
            // 전체 합산액 비교
            coreHtml += cmpTol('2. 총 청구액 대사', 기안.세금계산서발행액 || 기안.총공급가액, 계약서.총계약금액, '기안서', '계약서', 0);
        } else {
            coreHtml += cmpTol('1. 단일 계약금액 대사', 기안.세금계산서발행액 || 기안.총공급가액, 계약서?.총계약금액, '기안서', '계약서', 0);
        }
        coreHtml += cmpTxt('3. 지급 조건/예정일 대사', 기안.입금예정일, 계약서?.지급조건, '기안서', '계약서');
    }
    // --- 라우팅 3: 해외 매출 (환율 소수점 오차 ±2 허용, Tax 차감 로직) ---
    else if (type === '매출_해외') {
        coreHtml += `<div class="ci info"><div class="cs">i</div><div class="cc"><div class="cl-lbl">1. 해외 Tax 공제 확인</div><div class="diff"><div class="dr"><span class="dval">엑셀 내 Tax 누적액: ${fmtAmt(엑셀?.해외Tax)} 발견됨</span></div></div></div></div>`;
        coreHtml += cmpTol('2. 최종 실지급액 (수익 - Tax)', 기안.세금계산서발행액, 엑셀?.예상매출계산서, '기안서', '엑셀역산', 2);
    }
    // --- 라우팅 4: 국내 매출 (RS 정산, MG 차감 역산 로직) ---
    else {
        if(엑셀?.MG차감액 > 0 || 기안.MG차감액 > 0) {
            coreHtml += cmpTol('1. MG 차감액 대사', 기안.MG차감액, 엑셀?.MG차감액, '기안서', '엑셀', 0);
        }
        coreHtml += cmpTol('2. 최종 세금계산서 발행액 (수익 - MG차감)', 기안.세금계산서발행액, 엑셀?.예상매출계산서, '기안서', '엑셀(수익-MG)', 2);
    }

    document.getElementById('r_core').innerHTML = coreHtml;
    document.getElementById('rsum').innerHTML = globalErrors === 0
      ? `<div class="r-sum"><div class="ri ok">✅</div><div class="rt"><h3 class="ok">정밀 검증 패스 — 상신 가능</h3><p>복잡한 수식(MG, 세금절사) 및 지정 서류가 오차범위 내 일치합니다.</p></div></div>`
      : `<div class="r-sum"><div class="ri fail">❌</div><div class="rt"><h3 class="fail">${globalErrors}건의 회계적 오류 발견</h3><p>붉은색(✕)으로 표시된 내역을 확인해 주세요.</p></div></div>`;
    
    document.getElementById('rc').classList.add('show');
  } catch(e) { alert('오류: ' + e.message); } finally { btn.disabled = false; btn.innerHTML = '🔍 AI 심층 대사 시작'; }
}
</script>
</body>
</html>
