<html lang="ko">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 기안서 검증기 — 자동 라우팅 적용</title>

<script>
if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
/* UI 디자인 (기존 v9.1 스타일 유지) */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root {
  --navy:#1a2744; --accent:#3b6fd4; --accent-l:#e8edf8;
  --ok:#1a7f4b; --ok-bg:#eafaf1; --err:#c0392b; --err-bg:#fdf0ee;
  --border:#d8dde8; --text:#1a2744; --sub:#6b7a99; --bg:#f4f6fb; --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:28px 16px 80px}
.hd{max-width:760px;margin:0 auto 20px;display:flex;align-items:center;gap:13px}
.logo{width:42px;height:42px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:21px;height:21px}
.hd-txt h1{font-size:17px;font-weight:700;color:var(--navy)}
.hd-txt p{font-size:11px;color:var(--sub);margin-top:2px}
.setup-card{background:var(--white);border:1.5px solid #f0c96a;border-radius:13px;max-width:760px;margin:0 auto 13px;overflow:hidden}
.setup-hd{background:#fffbee;padding:11px 17px;border-bottom:1px solid #f0e4bb}
.setup-hd h2{font-size:12px;font-weight:600;color:#7a5800}
.setup-bd{padding:14px 17px}
.api-row{display:flex;gap:7px}
.api-row input{flex:1;height:36px;border:1.5px solid var(--border);border-radius:7px;padding:0 11px;font-size:12px;font-family:monospace;outline:none;background:#fafbfd}
.btn-save{height:36px;padding:0 14px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.key-ok{font-size:11px;color:var(--ok);margin-top:5px;display:none}
.key-ok.show{display:block}
.card{background:var(--white);border:1px solid var(--border);border-radius:13px;max-width:760px;margin:0 auto 13px;overflow:hidden}
.ch{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:9px}
.ch h2{color:#fff;font-size:13px;font-weight:600}
.cb{padding:16px 18px}
.drop{border:2px dashed var(--border);border-radius:9px;padding:20px 18px;text-align:center;cursor:pointer;background:#fafbfd;transition:all .2s}
.drop.over{border-color:var(--accent);background:var(--accent-l)}
.drop-ic{font-size:24px;margin-bottom:5px}
.drop p{font-size:12px;color:var(--sub)}
.img-prev{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.img-prev.show{display:block}
.file-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.file-card{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#f7f9fc;border:1px solid var(--border);border-radius:9px;font-size:12px; color:var(--navy)}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-v{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;max-width:760px;margin:7px auto;height:52px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.prog{max-width:760px;margin:0 auto 13px;display:none}
.prog.show{display:block}
.prog-steps{display:flex;gap:5px}
.ps{flex:1;padding:7px 6px;border-radius:7px;font-size:10px;font-weight:600;text-align:center;border:1.5px solid var(--border);color:var(--sub);background:#fff}
.ps.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.ps.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
.rc{display:none}
.rc.show{display:block}
.r-sum{padding:16px 18px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--border)}
.ri{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ri.ok{background:var(--ok-bg)}
.ri.fail{background:var(--err-bg)}
.rt h3{font-size:15px;font-weight:700}
.rt h3.ok{color:var(--ok)}
.rt h3.fail{color:var(--err)}
.rt p{font-size:11px;color:var(--sub);margin-top:2px}
.chk-group{padding:13px 18px;border-bottom:1px solid var(--border)}
.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid transparent;margin-bottom:7px;background:#fff}
.ci.pass{border:1.5px solid #b2e0cc}
.ci.fail{background:var(--err-bg);border:1.5px solid #f5c0bb}
.ci.info{background:#fdfdfd;border:1.5px solid var(--border)}
.cs{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;margin-top:2px}
.ci.pass .cs{background:var(--ok);color:#fff}
.ci.fail .cs{background:var(--err);color:#fff}
.ci.info .cs{background:var(--sub);color:#fff}
.cc{flex:1}
.cl-lbl{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:3px}
.cl-det{font-size:12px;font-weight:600;color:#111}
.diff{margin-top:8px;display:flex;flex-direction:column;gap:5px;background:#f4f6fb;padding:8px 10px;border-radius:6px}
.dr{display:flex;align-items:center;gap:6px}
.dtag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;min-width:65px;text-align:center;border:1px solid var(--border);background:#fff}
.dtag.src1{border-color:var(--navy);color:var(--navy)}
.dtag.src2{background:#e3f5ec;color:#1a7f4b}
.dval{font-size:12px;color:var(--text);font-weight:500}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err-banner{background:#fdf0ee;border:1.5px solid #f5c0bb;border-radius:8px;padding:10px 14px;margin:10px 18px;font-size:12px;color:var(--err)}
</style>

<body>

<div class="hd">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>

  <div class="hd-txt">
    <h1>기안서 스마트 검증기 <span style="font-size:11px;color:var(--sub);font-weight:400">(자동 라우팅 적용)</span></h1>
    <p>문서 양식을 자동 분석하여 선인세, RS/MG, 외주비에 맞는 대사를 수행합니다.</p>
  </div>
</div>

<div class="setup-card">

<div class="card">

    <div class="opt-grid">
      <div class="drop" id="conDrop">

      </div>
      <div class="drop" id="mailDrop">
        <input type="file" id="mailInput" accept="image/*,.pdf" multiple style="display:none">

      </div>

        <input type="file" id="bizInput" accept="image/*,.pdf" multiple style="display:none">

      </div>

</div>

<button class="btn-v" id="vBtn" onclick="run()">🔍 &nbsp;스마트 대사 시작</button>

<div class="prog" id="prog">
  <div class="prog-steps">
    <div class="ps" id="ps1">서류 인식 중</div>
    <div class="ps" id="ps2">데이터 파싱</div>

  </div>
</div>

  <div id="rsum"></div>

  <div id="r_core"></div>

</div>

<script>
let apiKey = localStorage.getItem('tf_api_key') || '';
let imgFileObj = null; let excelFiles = [];
let mailFiles = [], webFiles = [], bizFiles = [], conFiles = [];
let globalErrors = 0;
let aiErrors = [];

if(apiKey){ document.getElementById('apiKey').value=apiKey; document.getElementById('keyOk').classList.add('show'); }
function saveKey(){ apiKey=document.getElementById('apiKey').value.trim(); localStorage.setItem('tf_api_key',apiKey); document.getElementById('keyOk').classList.add('show'); }

function fmtAmt(n){ if(n===null||n===undefined) return '—'; return Number(n).toLocaleString('ko-KR'); }
function parseAmt(v){ if(v===null||v===undefined||v==='') return null; const n=parseFloat(String(v).replace(/[^0-9.-]/g,'')); return isNaN(n)?null:n; }

async function pdfToImages(file){
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:ab}).promise; const imgs = [];
  for(let i=1;i<=Math.min(pdf.numPages, 4);i++){
    const page = await pdf.getPage(i);
    const vp = page.getViewport({scale:2.0}); const cv = document.createElement('canvas');
    cv.width=vp.width; cv.height=vp.height; await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    imgs.push({ media_type: 'image/png', data: cv.toDataURL('image/png').split(',')[1] });
  } return imgs;
}
async function fileToBase64s(file) {
  if (!file) return [];
  if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) return await pdfToImages(file);
  const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(r.result); r.readAsDataURL(file); });
  return [{ media_type: b64.match(/^data:(image\/[a-zA-Z0-9+.-]+);base64,/)?.[1]||'image/jpeg', data: b64.split(',')[1] }];
}

function initDrop(id, inputId, callback) {
  const zone = document.getElementById(id);
  const input = document.getElementById(inputId);
  zone.onclick = () => input.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('over'); };
  zone.ondragleave = e => { e.preventDefault(); zone.classList.remove('over'); };
  zone.ondrop = e => { e.preventDefault(); zone.classList.remove('over'); if(e.dataTransfer.files.length) callback(e.dataTransfer.files); };
  input.onchange = e => { if(e.target.files.length) callback(e.target.files); };
}

// PDF 뷰어
initDrop('imgDrop', 'imgInput', files => {
  imgFileObj = files[0]; 
  const prevBox = document.getElementById('imgPrev');
  prevBox.classList.add('show');

  if (imgFileObj.name.toLowerCase().endsWith('.pdf')) {
    const objUrl = URL.createObjectURL(imgFileObj);
    prevBox.innerHTML = `<embed src="${objUrl}#view=FitH&toolbar=0&navpanes=0" type="application/pdf" width="100%" height="280px" style="border-radius:8px; border:none; display:block; background:#f0f2f7;">`;
  } else {
    const r = new FileReader();
    r.onload = ev => { 
      prevBox.innerHTML = `<img src="${ev.target.result}" style="width:100%; max-height:280px; object-fit:contain; background:#f0f2f7; display:block; border-radius:8px;">`;
    };
    r.readAsDataURL(imgFileObj); 
  }
});
initDrop('xlsDrop', 'xlsInput', files => {
  for (let f of files) {
    const r = new FileReader();
    r.onload = ev => {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const parsed = parseExcelData(wb);
      excelFiles.push({name: f.name, wb: wb, data: parsed});
      document.getElementById('fileList').innerHTML += `<div class="file-card">📊 ${f.name} <strong style="color:var(--ok); margin-left:auto">${fmtAmt(parsed.totalNet || parsed.totalGross)}</strong></div>`;
    }; r.readAsArrayBuffer(f);
  }
});
initDrop('mailDrop','mailInput',fs=>{mailFiles.push(...fs); document.getElementById('mailCount').innerText=mailFiles.length+'개'});
initDrop('webDrop','webInput',fs=>{webFiles.push(...fs); document.getElementById('webCount').innerText=webFiles.length+'개'});
initDrop('conDrop','conInput',fs=>{conFiles.push(...fs); document.getElementById('conCount').innerText=conFiles.length+'개'});
initDrop('bizDrop','bizInput',fs=>{bizFiles.push(...fs); document.getElementById('bizCount').innerText=bizFiles.length+'개'});

function parseExcelData(wb) {
  let meta = { totalNet: 0, totalGross: 0, totalTax: 0, totalForeign: 0 };
  if(!wb || !wb.SheetNames.length) return meta;
  for(const sn of wb.SheetNames) {
    const ws = wb.Sheets[sn]; if(!ws) continue;
    const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
    for (let r=0; r<data.length; r++) {
      const row = data[r]||[];
      const firstCol = String(row[0]||'').replace(/\s/g,'');
      if (firstCol === '합계' || firstCol.includes('유형별요약')) {
        meta.totalGross = parseAmt(row[8]) || meta.totalGross;
        meta.totalTax = (parseAmt(row[11]) || 0) + (parseAmt(row[12]) || 0) || meta.totalTax;
        meta.totalNet = parseAmt(row[13]) || meta.totalNet;
        if (meta.totalGross > 0 || meta.totalNet > 0) return meta;
      }
    }
    let cNet=-1, cGross=-1, cTax1=-1, cTax2=-1, cTaxSum=-1;
    for (let r=0; r<Math.min(data.length, 15); r++) {
      const row = data[r]||[];
      for (let c=0; c<row.length; c++) {
        const v = String(row[c]||'').replace(/\s/g,'');
        if(v.includes('실지급') || v.includes('차인지급') || v.includes('최종입금') || v.includes('순지급액')) cNet=c;
        if(v.includes('공급가') || v.includes('정산금액') || v.includes('지급총액')) cGross=c;
        if(v.includes('소득세')) cTax1=c; if(v.includes('지방세')) cTax2=c;
        if(v.includes('공제액') || v.includes('세액합계')) cTaxSum=c;
      }
      if(cNet!==-1 || cGross!==-1 || cTaxSum!==-1) {
        for(let ir=r+1; ir<data.length; ir++) {
          if(cNet!==-1) meta.totalNet += (parseAmt(data[ir][cNet])||0);
          if(cGross!==-1) meta.totalGross += (parseAmt(data[ir][cGross])||0);
          if(cTaxSum!==-1) meta.totalTax += (parseAmt(data[ir][cTaxSum])||0);
          else if(cTax1!==-1 && cTax2!==-1) meta.totalTax += ((parseAmt(data[ir][cTax1])||0) + (parseAmt(data[ir][cTax2])||0));
        }
        break;
      }
    }
  }
  if(meta.totalNet === 0 && meta.totalGross > 0) meta.totalNet = meta.totalGross;
  return meta;
}

const PROMPT_기안서=`이미지 속 정산 기안서를 분석하여 순수 JSON만 응답하세요. 코드펜스 금지. 금액 쉼표 제외.
- 문서양식: 기안서 최상단의 문서 양식명 (예: "매입 정산요청서")
- 문서제목: 기안서 본문의 제목 (예: "[웹소설] 선인세/외주비 지급 요청")
- 기안유형: AI 판별 ("선급금_매절", "RS_MG정산", "외주비_원천세" 중 택1)
- 공급가액: 본문에 명시된 '세전' 총액 (필수 추출)
- 공제액: 차감 세금 총합계 (명시 없으면 0)
- 실지급액: '세후/실지급' 금액. 없으면 공급가액-공제액 계산.
{"문서양식": "", "문서제목": "", "기안유형": "", "공급가액": 0, "공제액": 0, "실지급액": 0}`;

const PROMPT_계약서=`계약서에서 추출. JSON만 응답. {"총계약금액": null}`;
const PROMPT_메일=`메일에서 추출. JSON만 응답. {"총금액": null}`;

async function aiCall(file, prompt, label) {
  if(!file) return null;
  let b64Objs;
  try { b64Objs = await fileToBase64s(file); } catch(e) { aiErrors.push(`[${label}] 파일 오류`); return null; }
  let contentBlocks = b64Objs.map(obj => ({type:'image', source:{type:'base64', media_type: obj.media_type, data: obj.data}}));
  contentBlocks.push({type:'text', text:prompt});
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-3-5-haiku-20241022', max_tokens: 2500, messages: [{role:'user', content: contentBlocks}] })
    });
    const d = await res.json(); if (d.error) { aiErrors.push(`[${label}] API: ${d.error.message}`); return null; }
    let raw = d.content[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
    return JSON.parse(raw.match(/\{[\s\S]*\}/)[0].replace(/,\s*([}\]])/g, '$1'));
  } catch(e) { aiErrors.push(`[${label}] 통신 실패`); return null; }
}

function cmp(label, draftVal, targetObj, isAmt=false, tolerance=0) {
  if (!targetObj || !targetObj.provided) return `<div class="ci info"><div class="cs">i</div><div class="cc"><div class="cl-lbl">${label}</div><div class="cl-det" style="color:var(--sub)">대사 대상 없음 (증빙 미등록)</div></div></div>`;
  let match = isAmt && draftVal!==null && targetObj.val!==null ? Math.abs(Number(draftVal) - Number(targetObj.val)) <= tolerance : String(draftVal) === String(targetObj.val);
  if (!match) globalErrors++;
  return `<div class="ci ${match?'pass':'fail'}"><div class="cs">${match?'✓':'✕'}</div><div class="cc">
    <div class="cl-lbl">${label} <span style="font-size:10px; color:var(--accent); font-weight:normal;">(${targetObj.name} 기준)</span></div>
    <div class="cl-det">${match?'일치 ✓':'불일치 ⚠'}</div>
    <div class="diff">
      <div class="dr"><span class="dtag src1">기안서</span><span class="dval">${isAmt?fmtAmt(draftVal):draftVal}</span></div>
      <div class="dr"><span class="dtag src2">${targetObj.name}</span><span class="dval" style="color:${match?'var(--ok)':'var(--err)'}">${isAmt?fmtAmt(targetObj.val):targetObj.val}</span></div>
    </div>
  </div></div>`;
}

async function run() {
  if(!apiKey || !imgFileObj) return alert('API 키와 기안서를 확인하세요.');
  const btn = document.getElementById('vBtn'); btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';
  document.getElementById('prog').classList.add('show'); globalErrors = 0; aiErrors = [];
  
  try {
    document.getElementById('ps1').classList.add('active');
    const 기안 = await aiCall(imgFileObj, PROMPT_기안서, '기안서') || {};
    const 계약서 = conFiles.length ? await aiCall(conFiles[0], PROMPT_계약서, '계약서') : null;
    const 메일 = mailFiles.length ? await aiCall(mailFiles[0], PROMPT_메일, '메일') : null;
    const 엑셀 = excelFiles.length ? excelFiles[0].data : null;
    document.getElementById('ps1').classList.remove('active');
    document.getElementById('ps3').classList.add('active');

    const txtContext = ((기안.문서제목 || '') + ' ' + (기안.문서양식 || '')).toLowerCase();
    let draftType = '기타';
    let trackName = '';

    if (txtContext.includes('rs') || txtContext.includes('mg') || txtContext.includes('매출')) {
      draftType = 'Case2';
      trackName = 'RS / MG 매출 정산';
    } else if (txtContext.includes('선인세') || txtContext.includes('계약금') || txtContext.includes('매절')) {
      draftType = 'Case1';
      trackName = '선급금 / 매절 / 계약금';
    } else if (txtContext.includes('외주비') || txtContext.includes('원고료') || txtContext.includes('지급')) {
      draftType = 'Case3';
      trackName = '외주비 / 원고료 (원천세)';
    } else {
      draftType = 기안.기안유형;
      trackName = '일반 대사 (AI 자율 판별)';
    }

    let coreHtml = `<div class="chk-group" style="background:var(--accent-l); border-radius:8px; padding:12px; margin-bottom:10px">
      <strong style="color:var(--navy)">🎯 스마트 라우팅 가동: [ ${trackName} ] 트랙</strong><br>
      <span style="font-size:11px; color:var(--sub)">문서 키워드 분석 결과에 따라 맞춤형 검증 기준을 적용합니다.</span>
    </div>`;

    if (draftType === 'Case1' || draftType === '선급금_매절') {
      const targetAmt = { name: '계약서', val: 계약서?.총계약금액, provided: !!계약서 };
      coreHtml += cmp('1. 기안서 ↔ 계약서 금액 대사', 기안.공급가액 || 기안.실지급액, targetAmt, true, 0);
      if (메일) coreHtml += cmp('2. 청구 메일 금액 대사 (선택)', 기안.공급가액, {name:'청구 메일', val:메일.총금액, provided:true}, true, 0);
    } 
    else if (draftType === 'Case2' || draftType === 'RS_MG정산') {
      const targetAmt = { name: '정산 엑셀', val: 엑셀?.totalNet || 엑셀?.totalGross, provided: !!엑셀 };
      coreHtml += cmp('1. 기안서 ↔ 엑셀 취합 금액 대사', 기안.실지급액 || 기안.공급가액, targetAmt, true, 10);
    }
    else if (draftType === 'Case3' || draftType === '외주비_원천세') {
      const isGrossOnly = (!기안.공제액 || 기안.공제액 === 0) && (기안.공급가액 > 0);
      if (isGrossOnly) {
        coreHtml += cmp('1. 기안서(세전) ↔ 엑셀(세전 총합) 대사', 기안.공급가액, {name:'엑셀', val:엑셀?.totalGross, provided:!!엑셀}, true, 10);
        coreHtml += `<div class="ci info"><div class="cs">i</div><div class="cc">
          <div class="cl-lbl">2. 원천세율 자동 적용 안내</div>
          <div class="cl-det" style="color:var(--sub)">기안서에 세액 명시가 없어 엑셀의 세후 실지급액(${fmtAmt(엑셀?.totalNet)}원)으로 정산됩니다.</div>
        </div></div>`;
      } else {
        const mathOk = Math.abs(기안.공급가액 - 기안.공제액 - 기안.실지급액) < 10;
        if(!mathOk) globalErrors++;
        coreHtml += `<div class="ci ${mathOk?'pass':'fail'}"><div class="cs">${mathOk?'✓':'✕'}</div><div class="cc">
          <div class="cl-lbl">1. 산술 검증 (원금 - 세금 = 실지급액)</div>
          <div class="cl-det">${mathOk?'수식 정상':'오류'}</div>
          <div class="diff"><div class="dr"><span class="dval">${fmtAmt(기안.공급가액)} - ${fmtAmt(기안.공제액)} = ${fmtAmt(기안.실지급액)}</span></div></div>
        </div></div>`;
        coreHtml += cmp('2. 엑셀 실지급액 대사', 기안.실지급액, {name:'엑셀', val:엑셀?.totalNet, provided:!!엑셀}, true, 10);
      }
    }
    else {
      coreHtml += cmp('1. 총금액 (엑셀 우선 대사)', 기안.실지급액 || 기안.공급가액, { name: '엑셀/메일', val: 엑셀?.totalNet || 메일?.총금액, provided: !!(엑셀 || 메일) }, true, 0);
    }

    document.getElementById('r_core').innerHTML = coreHtml;
    if(aiErrors.length) document.getElementById('r_err').innerHTML = `<div class="err-banner">⚠️ 일부 인식 오류:<br>${aiErrors.join('<br>')}</div>`;
    else document.getElementById('r_err').innerHTML = '';

    document.getElementById('rsum').innerHTML = globalErrors === 0
      ? `<div class="r-sum"><div class="ri ok">✅</div><div class="rt"><h3 class="ok">이상 없음 — 기안 상신 가능</h3><p>트랙별 필수 항목 및 수식 대사 통과</p></div></div>`
      : `<div class="r-sum"><div class="ri fail">❌</div><div class="rt"><h3 class="fail">${globalErrors}개 항목 불일치 또는 오류</h3><p>기안 내역과 증빙 자료를 다시 확인해 주세요.</p></div></div>`;
    
    document.getElementById('ps3').classList.remove('active'); document.getElementById('ps3').classList.add('done');
    document.getElementById('rc').classList.add('show');
  } catch(e) { alert('오류: ' + e.message); } finally { btn.disabled = false;
  btn.innerHTML = '🔍 스마트 대사 시작'; }
}
</script>
</body>
</html>
